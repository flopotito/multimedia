<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Florencia Umaña</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Libre Baskerville', serif;
margin:0;
background-image: url("fondo.jpg");
background-size: cover;
background-repeat: no-repeat;
background-position: center;
}

/* capa oscura */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* HEADER IGUAL QUE OBRAS */
.header{
position:absolute;
top:25px; /* 👈 MISMA ALTURA */
left:60px;
display:flex;
align-items:center;
gap:30px;
}

.header h1{
font-size:28px;
margin:0;
font-weight:normal;
letter-spacing:1px;
}

.header a{
text-decoration:none;
color:white;
}

/* MENÚ */
.menu{
display:flex;
gap:20px;
}

.seccion a{
text-decoration:none;
color:white;
font-size:16px;
opacity:0.8;
transition:opacity 0.3s;
}

.seccion a:hover{
opacity:0.4;
}

/* CONTENIDO */
.contenido{
display:flex;
margin-top:120px;
height:calc(100vh - 120px);
}

.contacto{
width:40%;
padding:60px;
color:white;
background:rgba(0,0,0,0.3);
}

.imagen{
width:60%;
}

.imagen img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="header">
<h1><a href="index.html">Florencia Umaña</a></h1>

<div class="menu">
<div class="seccion">
<a href="obras.html">Obras</a>
</div>
<div class="seccion">
<a href="contacto.html" style="opacity:0.4;">Contacto</a>
</div>
</div>
</div>

<div class="contenido">

<div class="contacto">
<p>Email: flobelen@gmail.com</p>
<p>Instagram: @florquesiente</p>
</div>

<div class="imagen">
<img src="imgcontacto.jpg">
</div>

</div>

</body>
</html>
