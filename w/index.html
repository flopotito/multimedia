<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Florencia Umaña</title>

<style>
body {
    font-family: monospace;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;

    /* Fondo de la página */
    background-image: url("fondo.jpg");
    background-size: 60%;
    background-repeat: no-repeat;
    background-position: center;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5); /* capa oscura general */
    z-index: -1;
}

.contenedor {
    width: 90%;
    max-width: 900px;
    text-align: center;
}

/* Título principal */
h1 {
    font-size: 48px;
    margin-bottom: 10px;
    color: white;
}

p {
    font-size: 20px;
    margin-top: 0;
    color: white;
}

/* Bloques de sección más pequeños y translúcidos */
.seccion {
    background-color: rgba(255,255,255,0.2); /* translúcido inicial */
    color: white;
    padding: 25px 15px;
    width: 20%;
    margin: 15px auto;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, background-color 0.3s;
    font-size: 22px;
}

/* Hover: el bloque se vuelve más opaco y resalta */
.seccion:hover {
    background-color: rgba(255, 255, 255, 0.825); 
    color: black;
    transform: scale(1.05);
}

.seccion a {
    text-decoration: none;
    color: inherit;
    font-weight: bold;
    display: block;
}
</style>
</head>

<body>

<div class="contenedor">

    <h1>Florencia Umaña</h1>
    <p>Portafolio artístico</p>

    <!-- SECCIÓN OBRAS -->
    <div class="seccion">
        <a href="obras.html">Obras</a>
    </div>

    <!-- SECCIÓN ARCHIVO -->
    <div class="seccion">
        <a href="#">Archivo</a>
       
    </div>

    <!-- SECCIÓN CONTACTO -->
    <div class="seccion">
        <a href="#">Contacto</a>
      
    </div>

</div>

</body>
</html>
