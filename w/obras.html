<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Obras - Florencia Umaña</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Libre Baskerville', serif;
margin:0;
background-image: url("fondo.jpg");
background-size: cover;
background-repeat: no-repeat;
background-position: center;
}

/* capa oscura */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* CONTENEDOR GENERAL */
.contenedor{
position:relative;
width:100%;
min-height:100vh;
}

/* HEADER IZQUIERDA */
.header{
position:absolute;
top:50px;
left:60px;
}

h1{
font-size:28px;
margin:0;
color:white;
font-weight:normal;
letter-spacing:1px;
}

/* 👇 PARA QUE EL LINK NO CAMBIE EL ESTILO */
.header a{
text-decoration:none;
color:white;
}

/* MENÚ DERECHA */
.menu{
position:absolute;
top:50px;
right:60px;
display:flex;
gap:25px;
}

.seccion a{
text-decoration:none;
color:white;
font-size:16px;
opacity:0.8;
transition:opacity 0.3s;
}

.seccion a:hover{
opacity:0.4;
}

/* GALERÍA */
.galeria{
width:90%;
max-width:1500px;
margin:140px auto 40px auto;
display:grid;
grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
gap:20px;
}

.galeria img{
width:100%;
cursor:pointer;
border-radius:6px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:10;
padding-top:60px;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
text-align:center;
}

.modal img{
max-width:80%;
max-height:70vh;
}

.descripcion{
color:white;
margin-top:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

.cerrar{
position:absolute;
top:20px;
right:40px;
color:white;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="contenedor">

<!-- HEADER -->
<div class="header">
<h1><a href="index.html">Florencia Umaña</a></h1>
</div>

<!-- MENÚ -->
<div class="menu">
<div class="seccion">
<a href="obras.html">Obras</a>
</div>
<div class="seccion">
<a href="contacto.html">Contacto</a>
</div>
</div>

<!-- GALERÍA -->
<div class="galeria">

<img src="img1.jpg" onclick="abrir(this,'Autorretrato','Cabeza realizada con greda.')">
<img src="img2.jpg" onclick="abrir(this,'Diapositivas','Imágenes creadas con maquillaje en soporte transparente.')">
<img src="img3.jpg" onclick="abrir(this,'Árbol','Placas de yeso y tierra de color trabajadas con gubia.')">
<img src="img4.jpg" onclick="abrir(this,'1 peso','Placas de yeso, tierra de color y monedas.')">
<img src="img5.jpg" onclick="abrir(this,'2 sellos','Placas de yeso, tierra de color y monedas.')">
<img src="img6.jpg" onclick="abrir(this,'Pedacitos de mi','Moldes de parafina y resina de distintas partes de mi cuerpo, tales como cara, boca, dedos y pies.')">
<img src="img7.jpg" onclick="abrir(this,'La piscina','Escultura en sitio especifico, realizada con alambre y masilla mágica.')">
<img src="img8.jpg" onclick="abrir(this,'Fragmentos','Moldes del pie realizados con yeso dental y yeso común.')">
<img src="img9.jpg" onclick="abrir(this,'5 tazas','Obra realizada con servilleta y colafria de distintos objetos que se encuentran en la once.')">
<img src="img10.JPEG" onclick="abrir(this,'Espejos','Modelado en greda y molde en resina puestos frente al otro.')">

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<span class="cerrar" onclick="cerrar()">&times;</span>

<img id="imgGrande">

<div class="descripcion">
<h2 id="titulo"></h2>
<p id="texto"></p>
</div>

</div>

<script>

function abrir(img,titulo,descripcion){
document.getElementById("modal").style.display="block";
document.getElementById("imgGrande").src=img.src;
document.getElementById("titulo").innerText=titulo;
document.getElementById("texto").innerText=descripcion;
}

function cerrar(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
